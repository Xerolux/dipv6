user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Cache settings
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=dynipv6_cache:10m
                     max_size=1g inactive=60m use_temp_path=off;

    # Upstream dynipv6 service
    upstream dynipv6_backend {
        least_conn;
        server dynipv6:5000;
        keepalive 32;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # IPv6 DDNS endpoint
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ipv6.xerolux.net;

        # SSL configuration
        ssl_certificate /etc/letsencrypt/live/ipv6.xerolux.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ipv6.xerolux.net/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Logging
        access_log /var/log/nginx/ipv6_access.log main;
        error_log /var/log/nginx/ipv6_error.log warn;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Proxy settings - disable cache for state-changing endpoints
        location / {
            set $no_cache 0;
            if ($request_uri ~* "/api/(update|status)") {
                set $no_cache 1;
            }

            proxy_pass http://dynipv6_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache GET requests (except for update and status endpoints)
            proxy_cache dynipv6_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 1m;
            proxy_cache_valid 404 1m;
            proxy_no_cache $no_cache;
            proxy_cache_bypass $no_cache;
            add_header X-Cache-Status $upstream_cache_status;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Health check endpoint (no cache)
        location /api/health {
            proxy_pass http://dynipv6_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            access_log off;
        }
    }

    # IPv4 DDNS endpoint
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ipv4.xerolux.net;

        # SSL configuration
        ssl_certificate /etc/letsencrypt/live/ipv4.xerolux.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ipv4.xerolux.net/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Logging
        access_log /var/log/nginx/ipv4_access.log main;
        error_log /var/log/nginx/ipv4_error.log warn;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Proxy settings - disable cache for state-changing endpoints
        location / {
            set $no_cache 0;
            if ($request_uri ~* "/api/(update|status)") {
                set $no_cache 1;
            }

            proxy_pass http://dynipv6_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache GET requests (except for update and status endpoints)
            proxy_cache dynipv6_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 1m;
            proxy_cache_valid 404 1m;
            proxy_no_cache $no_cache;
            proxy_cache_bypass $no_cache;
            add_header X-Cache-Status $upstream_cache_status;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Health check endpoint (no cache)
        location /api/health {
            proxy_pass http://dynipv6_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            access_log off;
        }
    }
}
