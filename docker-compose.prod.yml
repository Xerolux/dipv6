version: '3.8'

services:
  # Main DDNS API Service
  ddns-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ddns-api
    hostname: ddns-api
    restart: always
    networks:
      - ddns-network
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./config.json:/etc/dynipv6/config.json:ro
      - ddns-data:/var/lib/dynipv6
      - ddns-logs:/var/log/dynipv6
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # Web Admin Panel
  webui:
    build:
      context: .
      dockerfile: Dockerfile.webui
    container_name: ddns-webui
    hostname: ddns-webui
    restart: always
    networks:
      - ddns-network
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ./config.json:/etc/dynipv6/config.json
      - ddns-secrets:/etc/dynipv6/secrets
      - ddns-data:/var/lib/dynipv6:ro
      - ddns-logs:/var/log/dynipv6
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
    depends_on:
      ddns-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ddns-nginx
    hostname: ddns-nginx
    restart: always
    networks:
      - ddns-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    depends_on:
      - ddns-api
      - webui
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # Monitoring & Logging (optional but recommended)
  prometheus:
    image: prom/prometheus:latest
    container_name: ddns-prometheus
    restart: always
    networks:
      - ddns-network
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # Log aggregation (optional but recommended)
  loki:
    image: grafana/loki:latest
    container_name: ddns-loki
    restart: always
    networks:
      - ddns-network
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

volumes:
  ddns-data:
    driver: local
  ddns-logs:
    driver: local
  ddns-secrets:
    driver: local
  nginx-cache:
    driver: local
  nginx-logs:
    driver: local
  prometheus-data:
    driver: local
  loki-data:
    driver: local

networks:
  ddns-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
