# =============================================================================
# vhost for dyn.blueml.one
#   /         -> Dynamic DNS service  (UniFi update endpoint, port 5000)
#   /admin/   -> Admin Web-UI panel   (port 5001, served under sub-path)
#
# Drop this file into /etc/nginx/conf.d/ (it is included inside the http{} block).
# Reload with: nginx -t && nginx -s reload
#
# NOTE on upstream targets:
#   - Bare-metal (both services on the same host): use 127.0.0.1:5000 / :5001 (default below)
#   - Docker Compose: replace with the service names, e.g. dynipv6:5000 / ddns-webui:5001
# =============================================================================

upstream dynipv6_backend {
    least_conn;
    server 127.0.0.1:5000;
    keepalive 32;
}

upstream dynipv6_webui {
    server 127.0.0.1:5001;
    keepalive 16;
}

# ---- HTTP -> HTTPS redirect (+ ACME challenge for certbot) ----
server {
    listen 80;
    listen [::]:80;
    server_name dyn.blueml.one;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dyn.blueml.one;

    ssl_certificate     /etc/letsencrypt/live/dyn.blueml.one/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dyn.blueml.one/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /var/log/nginx/dyn_access.log;
    error_log  /var/log/nginx/dyn_error.log warn;

    client_max_body_size 5M;

    # ---- Admin Web-UI panel (served under /admin) ----
    location = /admin { return 301 /admin/; }

    location /admin/ {
        # No trailing slash on proxy_pass: the full /admin/... path is forwarded.
        # The Web-UI honors X-Forwarded-Prefix to build correct links/redirects.
        proxy_pass http://dynipv6_webui;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /admin;

        # Certificate creation / wildcard requests can take a while
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ---- Dynamic DNS service (UniFi update endpoint) ----
    location / {
        proxy_pass http://dynipv6_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ---- Health check (no auth, no logging) ----
    location = /api/health {
        proxy_pass http://dynipv6_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }
}
